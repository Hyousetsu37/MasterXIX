<header style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: #3f51b5; color: white;">
  
  <div style="display: flex; align-items: center;">
    <span style="font-size: 28px; margin-right: 10px;">🍋</span>
    <h1 style="margin: 0; font-size: 1.5rem; letter-spacing: 1px;">Lab Basico Angular</h1>
  </div>
  
  <div style="display: flex; align-items: center; gap: 15px;">
    <span>Hola, <strong>{{ authService.username() }}</strong></span>
    <button mat-raised-button color="warn" (click)="onLogout()">
      Salir
    </button>
  </div>

</header>
